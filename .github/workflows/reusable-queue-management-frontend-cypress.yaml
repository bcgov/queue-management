name: Queue Management Frontend Cypress
on:
  workflow_call:
    inputs:
      ref:
        required: false
        type: string
        default: main
    secrets:
      cypress-project-id:
        required: false
      cypress-record-key:
        required: false
      keycloak-auth-url:
        required: false
      keycloak-client:
        required: false
      keycloak-realm:
        required: false

jobs:
  cypress:
    name: Cypress
    runs-on: ubuntu-latest
    environment:
      name: The Q Dev
    steps:
      - name: Check out
        uses: actions/checkout@v2
        with:
          ref: ${{ inputs.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.11.1' 

      - name: Configuration Files
        run: |
          
          mkdir -p frontend/public/static/keycloak
          mkdir -p frontend/public/config
          echo "Checking directory existence..."
          if [ -d "frontend/public/config/" ]; then 
            echo "Directory exists."
          else
            echo "Error: Directory does not exist."
            exit 1
          fi

          cat << EOF > frontend/public/config/configuration.json
          {
            "VUE_APP_API_URL": "http://localhost:5000/api/v1",
            "VUE_APP_SOCKET_URL" : "http://localhost:5000",
            "FEEDBACK_ENABLED": true,
            "KEYCLOAK_CONFIG_URL": "./public/static/keycloak/keycloak.json",
            "VUE_APP_FOOTER_LINKS": "https://www.icbc.com/locators",
            "VUE_APP_FOOTER_MSG": "Looking for ICBC Services? Ensure you are at the right place by visiting {link} icbc.com/locators",
            "VUE_APP_HEADER_LINKS": "https://www.gov.bc.ca/bcservicescardapp{link}https://www.bceid.ca",
            "VUE_APP_HEADER_MSG": "Before you start – do you have the {link}BC Services Card app{link} or {link}Basic BCeID{link}? Login needed to confirm appointment.",
          }
          EOF

          cat << EOF > frontend/public/static/keycloak/keycloak.json
          {
            "auth-server-url": "${{ secrets.keycloak-auth-url }}",
            "confidential-port": 0,
            "public-client": true,
            "realm": "${{ secrets.keycloak-realm }}",
            "resource": "${{ secrets.keycloak-client }}",
            "ssl-required": "external"
          }
          EOF

          cat << EOF > frontend/cypress.env.json
          {
            "BCEID_ENDPOINT": "${{ vars.BCEID_ENDPOINT_DEV}}",
            "BCEID_PASSWORD": "${{ secrets.bceid-password }}",
            "BCEID_USERNAME": "${{ vars.CYPRESS_BCEID_USERNAME }}"
          }
          EOF

      - name: Load Configuration JSON
        id: load_config
        run: |
          echo "Loading environment variables from configuration.json"
          # Extract variables from configuration.json and export them
          export $(jq -r 'to_entries | .[] | "\(.key)=\(.value)"' frontend/public/config/configuration.json)
          # Save variables to $GITHUB_ENV
          echo "VUE_APP_API_URL=${VUE_APP_API_URL}" >> $GITHUB_ENV
          echo "VUE_APP_SOCKET_URL=${VUE_APP_SOCKET_URL}" >> $GITHUB_ENV
          echo "FEEDBACK_ENABLED=${FEEDBACK_ENABLED}" >> $GITHUB_ENV
          echo "KEYCLOAK_CONFIG_URL=${KEYCLOAK_CONFIG_URL}" >> $GITHUB_ENV
          echo "VUE_APP_FOOTER_LINKS=${VUE_APP_FOOTER_LINKS}" >> $GITHUB_ENV
          echo "VUE_APP_FOOTER_MSG=${VUE_APP_FOOTER_MSG}" >> $GITHUB_ENV
          echo "VUE_APP_HEADER_LINKS=${VUE_APP_HEADER_LINKS}" >> $GITHUB_ENV
          echo "VUE_APP_HEADER_MSG=${VUE_APP_HEADER_MSG}" >> $GITHUB_ENV
      - name: Cypress Run
        uses: cypress-io/github-action@v6.0.0
        env:
          CYPRESS_PROJECT_ID: ${{ secrets.cypress-project-id }}
          CYPRESS_RECORD_KEY: ${{ secrets.cypress-record-key }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VUE_APP_PATH: /
        with:
          config-file: cypress.config.ts
          record: true
          start: npm run serve -- --port 8080
          wait-on: http://localhost:8080
          working-directory: frontend

      - name: On Failure Upload Screenshot Artifacts
        uses: actions/upload-artifact@v3
        if: failure()
        with:
          name: queue-management-frontend-cypress
          path: |
            frontend/cypress/screenshots
            frontend/cypress/snapshots/image_snapshot/*/__diff_output__
